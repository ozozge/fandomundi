  <meta charset="UTF-8" />

  <title>Domundi Fandom</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="logo-title">
      <img src="fandomundi_logo.png" alt="Fandom Logo" class="logo" />
    </div>
  </header>

  <nav class="navbar">
    <ul class="menu">

      <li class="menu-item"><a href="artists.html">Artists</a></li>
      <li class="menu-item"><a href="schedule.html">Events/Schedule</a></li>
      <li class="menu-item"><a href="dramas.html">Dramas</a></li>
      <li class="menu-item"><a href="music.html">Music</a></li>
      <li class="menu-item"><a href="staff.html">Staff</a></li>
      <li class="menu-item"><a href="fanevents.html">Fan Events</a></li>
      <li class="menu-item"><a href="contact.html">Contact</a></li>

    </ul>

  </nav>
  <main>

    <div style="padding: 40px 0 20px 60px;">
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:52px;color:#D46A1F;letter-spacing:3px;line-height:1;">Latest</h2>
  </div>

  <div class="carousel-peek" id="carouselWrap">
    <div class="peek-track" id="peekTrack">
      <img src="events/event1.jpg" class="peek-slide" style="cursor:pointer" onclick="window.open('https://www.allticket.com/event/dmdsportday2026','_blank')" />
      <img src="events/event2.jpg" class="peek-slide" />
      <img src="events/event3.jpg" class="peek-slide" style="cursor:pointer" onclick="window.open('https://youtu.be/ifeMSb2hRMk?si=fW7TKiLXCe3EfK4C')"/>
      <img src="events/event4.jpg" class="peek-slide" style="cursor:pointer" onclick="window.open('https://www.allticket.com/event/DUANGGOROUNDCONCERT')"/>
      <img src="events/event5.png" class="peek-slide" />
    </div>
    <button class="peek-btn peek-prev" id="peekPrev">&#8249;</button>
    <button class="peek-btn peek-next" id="peekNext">&#8250;</button>
    <div class="peek-dots" id="peekDots"></div>
  </div>
  </main>
  <script>
  const peekSlides = document.querySelectorAll('.peek-slide');
  const peekTrack  = document.getElementById('peekTrack');
  const peekDotsEl = document.getElementById('peekDots');
  let peekCurrent  = 0;
  let carouselTimer;

  peekSlides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.classList.add('peek-dot');
    if (i === 0) dot.classList.add('active');

    dot.addEventListener('click', () => {
      peekGoTo(i);
      restartCarouselTimer();
    });

    peekDotsEl.appendChild(dot);
  });

  function peekGoTo(index) {
    peekSlides[peekCurrent].classList.remove('active');
    document.querySelectorAll('.peek-dot')[peekCurrent].classList.remove('active');

    // Keeps carousel looping, but safely
    peekCurrent = (index + peekSlides.length) % peekSlides.length;

    peekSlides[peekCurrent].classList.add('active');
    document.querySelectorAll('.peek-dot')[peekCurrent].classList.add('active');

    const wrap = document.getElementById('carouselWrap');
    const slide = peekSlides[peekCurrent];
    const wrapCenter = wrap.offsetWidth / 2;
    const slideCenter = slide.offsetLeft + slide.offsetWidth / 2;

    peekTrack.style.transform = `translateX(${wrapCenter - slideCenter}px)`;
  }

  function restartCarouselTimer() {
    clearInterval(carouselTimer);
    carouselTimer = setInterval(() => {
      peekGoTo(peekCurrent + 1);
    }, 4000);
  }

  peekGoTo(0);
  restartCarouselTimer();

  document.getElementById('peekPrev').addEventListener('click', () => {
    peekGoTo(peekCurrent - 1);
    restartCarouselTimer();
  });

  document.getElementById('peekNext').addEventListener('click', () => {
    peekGoTo(peekCurrent + 1);
    restartCarouselTimer();
  });
</script>
</body>
</html>
