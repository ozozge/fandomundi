    :root {
      --orange: #D46A1F;
      --orange-bright: #f26a00;
      --black: #1a1008;
      --cream: #fffaf5;
      --card-bg: #fff8f0;
      --border: #f0d8c0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #1a1008 60%, #D46A1F 100%);
      background-attachment: fixed;
      color: #fff;
      min-height: 100vh;
    }

    /* ── PAGE HEADER ── */
    .dramas-header {
      padding: 60px 60px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .dramas-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 90px;
      color: var(--orange);
      letter-spacing: 4px;
      line-height: 1;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .dramas-header p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* ── FILTERS ── */
    .filters-wrap {
      padding: 28px 60px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-right: 2px;
    }

    .filter-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.5px;
    }

    .filter-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .filter-btn.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      fill: none;
      stroke: rgba(255,255,255,0.4);
      stroke-width: 2;
      stroke-linecap: round;
      pointer-events: none;
    }

    #actorSearch {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      padding: 7px 14px 7px 34px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      width: 200px;
      outline: none;
      transition: border-color 0.18s;
    }

    #actorSearch::placeholder {
      color: rgba(255,255,255,0.35);
    }

    #actorSearch:focus {
      border-color: var(--orange);
    }

    #sortSelect {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      outline: none;
      cursor: pointer;
      transition: border-color 0.18s;
    }

    #sortSelect:focus {
      border-color: var(--orange);
    }

    #sortSelect option {
      background: #1a1008;
      color: #fff;
    }

    /* ── RESULTS COUNT ── */
    .results-bar {
      padding: 16px 60px 0;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }

    /* ── DRAMA GRID ── */
    .drama-grid {
      padding: 24px 60px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    /* ── DRAMA CARD ── */
    .drama-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }

    .drama-card:hover {
      border-color: var(--orange);
      transform: translateY(-3px);
    }

    .poster-wrap {
      position: relative;
      aspect-ratio: 2/3;
      background: rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .drama-card:hover .poster-wrap img {
      transform: scale(1.04);
    }

    .poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
    }

    .year-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ── CARD BODY ── */
    .card-body {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .drama-name {
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      line-height: 1.35;
    }

    /* ── SCORES ── */
    .scores {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .score-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .score-imdb {
      background: #f5c518;
      color: #1a1a1a;
    }

    .score-mdl {
      background: #2a6ab5;
      color: #fff;
    }

    .score-na {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      font-weight: 400;
    }

    /* ── CAST ── */
    .cast-section {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .cast-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cast-label {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
    }

    .cast-names {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      line-height: 1.4;
    }

    .cast-names .main-cast {
      color: #fff;
      font-weight: 700;
    }

    /* ── WATCH LINKS ── */
    .watch-links {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: auto;
    }

    .watch-link {
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }

    .watch-link:hover {
      color: var(--orange-bright);
    }

    .watch-link svg {
      width: 10px;
      height: 10px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── NO RESULTS ── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.3);
      font-size: 15px;
    }

    .no-results strong {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: rgba(255,255,255,0.15);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      .dramas-header { padding: 30px 16px 16px; }
      .dramas-header h1 { font-size: 52px; }
      .results-bar { padding: 10px 16px 0; }

      .filters-wrap {
        padding: 16px;
        gap: 8px;
        flex-direction: column;
        align-items: flex-start;
      }

      .filter-group {
        overflow-x: auto;
        flex-wrap: nowrap;
        width: 100%;
        padding-bottom: 4px;
      }

      .search-wrap {
        width: 100%;
        margin-left: 0;
      }

      #actorSearch { width: 100%; }

      #sortSelect { width: 100%; }

      .drama-grid {
        grid-template-columns: repeat(2, 1fr);
        padding: 16px 12px 40px;
        gap: 10px;
      }

      .card-body {
        padding: 8px 10px 10px;
        gap: 6px;
      }

      .drama-name { font-size: 11px; }

      .score-pill { font-size: 10px; padding: 2px 6px; }
}

    // ─────────────────────────────────────────────
    // BUILD YEAR FILTERS
    // ─────────────────────────────────────────────
    const years = [...new Set(
      dramas.map(d => d.year).filter(y => y !== "TBA")
    )].sort((a, b) => b - a);

    const filterGroup = document.querySelector('.filter-group');
    years.forEach(yr => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.year = yr;
      btn.textContent = yr;
      filterGroup.appendChild(btn);
    });

    // Add TBA button if any
    if (dramas.some(d => d.year === "TBA")) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.year = 'TBA';
      btn.textContent = 'TBA';
      filterGroup.appendChild(btn);
    }

    // ─────────────────────────────────────────────
    // RENDER + FILTER
    // ─────────────────────────────────────────────
    let activeYear = 'all';
    let searchQuery = '';
    let sortBy = 'default';

    function buildCard(drama) {
      const supporting = drama.supporting || [];
      const allCast = [...drama.main, ...supporting];

      const scoreHTML = (() => {
        const parts = [];
        if (drama.imdb !== null) parts.push(`<span class="score-pill score-imdb">⭑ ${drama.imdb}</span>`);
        if (drama.mdl !== null)  parts.push(`<span class="score-pill score-mdl">MDL ${drama.mdl}</span>`);
        if (parts.length === 0)  parts.push(`<span class="score-pill score-na">Scores TBA</span>`);
        return parts.join('');
      })();

      const mainHTML = drama.main.map(n => `<span class="main-cast">${n}</span>`).join(', ');
      const supHTML  = supporting.length
        ? `<div class="cast-row"><div class="cast-label">Supporting</div><div class="cast-names">${supporting.join(', ')}</div></div>`
        : '';

      const linksHTML = drama.links.length
        ? `<div class="watch-links">${drama.links.map(l =>
            `<a href="${l.url}" target="_blank" class="watch-link">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
              ${l.label}
            </a>`
          ).join('')}</div>`
        : '';

      const posterHTML = `<img src="${drama.poster}" alt="${drama.title}" onerror="this.parentElement.innerHTML='<div class=\\'poster-placeholder\\'>No poster</div>'" />`;

      return `
        <div class="drama-card" data-year="${drama.year}" data-cast="${allCast.join(',').toLowerCase()}">
          <div class="poster-wrap">
            ${posterHTML}
            <span class="year-badge">${drama.year}</span>
          </div>
          <div class="card-body">
            <div class="drama-name">${drama.title}</div>
            <div class="scores">${scoreHTML}</div>
            <div class="cast-section">
              <div class="cast-row">
                <div class="cast-label">Main cast</div>
                <div class="cast-names">${mainHTML}</div>
              </div>
              ${supHTML}
            </div>
            ${linksHTML}
          </div>
        </div>`;
    }

    function render() {
      const grid = document.getElementById('dramaGrid');
      const query = searchQuery.trim().toLowerCase();

      const filtered = dramas.filter(d => {
        const yearMatch = activeYear === 'all' || String(d.year) === String(activeYear);
        const allCast = [...d.main, ...(d.supporting || [])].join(' ').toLowerCase();
        const castMatch = !query || allCast.includes(query) || d.title.toLowerCase().includes(query);
        return yearMatch && castMatch;
      });
      filtered.sort((a, b) => {
        if (sortBy === 'year') {
          const ya = a.year === 'TBA' ? 0 : a.year;
          const yb = b.year === 'TBA' ? 0 : b.year;
          return yb - ya;
        }
        if (sortBy === 'imdb') return (b.imdb ?? -1) - (a.imdb ?? -1);
        if (sortBy === 'mdl')  return (b.mdl ?? -1) - (a.mdl ?? -1);
        return 0;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-results"><strong>No results</strong>Try a different filter or actor name</div>`;
      } else {
        grid.innerHTML = filtered.map(buildCard).join('');
      }

      document.getElementById('resultsCount').textContent =
        filtered.length === dramas.length
          ? `${dramas.length} dramas`
          : `${filtered.length} of ${dramas.length} dramas`;

      document.getElementById('totalCount').textContent =
        `${dramas.length} dramas · Dramas that are not all produced by Domundi, but feature at least one Domundi artist in a lead role or multiple Domundi artists in supporting roles.`;
    }

    // Year filter clicks
    document.querySelector('.filter-group').addEventListener('click', e => {
      if (!e.target.matches('.filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeYear = e.target.dataset.year;
      render();
    });

    document.getElementById('sortSelect').addEventListener('change', e => {
      sortBy = e.target.value;
      render();
    });

    // Actor search
    document.getElementById('actorSearch').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    // Auto-sort alphabetical artist list
    const artistList = document.getElementById('artistList');
    if (artistList) {
      const items = Array.from(artistList.querySelectorAll('li'));
      items.sort((a, b) => a.textContent.trim().toLowerCase().localeCompare(b.textContent.trim().toLowerCase()));
      items.forEach(i => artistList.appendChild(i));
    }

    // Initial render
    render();
  </script>
